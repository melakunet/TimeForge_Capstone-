<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; padding: 40px 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        
        <h2 style="color: #2563eb; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #e5e7eb;">
            {{title}}
        </h2>
        
        <div style="margin-top: 20px; font-size: 16px; line-height: 1.6;">
            {{message}}
        </div>
        
        <div style="margin-top: 30px; padding: 15px; background: #f9fafb; border-left: 4px solid #3b82f6; border-radius: 4px; font-size: 14px;">
            <strong>Project:</strong> {{project_name}} <br>
            <strong>Detail:</strong> {{detail}}
        </div>

        <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 30px 0 20px;">
        
        <p style="color: #9ca3af; font-size: 12px; text-align: center; margin: 0;">
            This is an automated notification from the TimeForge Capstone application.<br>
            Please do not reply to this email directly.
        </p>
    </div>
</body>
</html>
